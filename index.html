<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Portfolio</title>
</head>
<body style="
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 40px;
    background: linear-gradient(to right, #dbeafe, #f0f9ff);
  ">

  <!-- Header -->
  <h1 style="color: #1e3a8a; font-size: 42px;">
    Renard Carlo Rulona
  </h1>

  <!-- Profile Picture -->
  <img 
    src="./images/profilepic.png" 
    alt="Profile Picture"
    style="
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #1e3a8a;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    "
  />

  <!-- Portfolio Description -->
  <p style="
      max-width: 600px;
      margin: 30px auto;
      font-size: 18px;
      line-height: 1.6;
      color: #374151;
      background-color: rgba(255,255,255,0.7);
      padding: 20px;
      border-radius: 10px;
    ">
    Hello! I am an incoming 2nd Year BSIT-Cybersecurity Student at FEU Diliman. I am aiming to further improve my skills in the different areas of IT and coding itself.
  </p>

  <!-- Hobbies List -->
  <ul style="
      list-style: none;
      padding: 0;
      margin: 0 auto;
      font-size: 18px;
      color: #1f2937;
      background-color: rgba(255,255,255,0.7);
      display: inline-block;
      padding: 20px 40px;
      border-radius: 10px;
    ">
    <li style="margin: 10px 0;">Video Games</li>
    <li style="margin: 10px 0;">Music</li>
    <li style="margin: 10px 0;">Traveling</li>
    <li style="margin: 10px 0;">Photography</li>
  </ul>

</body>
</html>
